/lgpm --modules-dir ./modules list", "status": "pass", "exit_code": 0, "output": "Found 2 installed module(s):\n\nNAME                           VERSION         TYPE       CATEGORY       \n----------------------------------------------------------------------\naccounts_module                1.0.0           core       accounts       \ncapability_module              1.0.0           core       security       \n", "note": ""}]}, {"md": "## Step 4: Run the daemon and call the module\n\nStart `logoscore` in daemon mode pointed at `./modules`, then use the client\nsubcommands to load `accounts_module`, introspect it, and call several of its\nmethods. Daemon output is captured in `logs.txt`.", "execs": []}, {"md": "### 4.1 Start the daemon\n\nStart logoscore in daemon mode in the background, capturing output to\n`logs.txt`:\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```\n\nThe `-D` flag starts the daemon. The client subcommands below connect to\nthis running process via the config written under `~/.logoscore/`.", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.2 Inspect the startup log\n\nReview the daemon's startup output:\n\n```bash\ncat logs.txt\n```", "execs": [{"kind": "run", "cmd": "cat logs.txt", "status": "pass", "exit_code": 0, "output": "[2026-06-22 19:05:43.286] [warning] [logos] Module capability_module carries no usable logos_protocol_version (pre-protocol build) \u2014 loading permissively\n[2026-06-22 19:05:43.526] [info] [logos] Module loaded: capability_module\nLogoscore daemon started (pid 5151, instance 2ee10eeddb59)\nDaemon state: /tmp/doctest-test-0mobci7z/.logoscore/daemon/state.json\nLocal client config: /tmp/doctest-test-0mobci7z/.logoscore/client/config.json\n", "note": ""}]}, the module, dispatched over liblogos' IPC:\n\n```bash\nlogoscore call accounts_module createRandomMnemonic 12\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module createRandomMnemonic 12", "status": "pass", "exit_code": 0, "output": "{\"method\":\"createRandomMnemonic\",\"module\":\"accounts_module\",\"result\":\"sunny quiz donor arrive index hover bid special juice obvious artist help\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.9 Generate a default-length mnemonic\n\n`createRandomMnemonicWithDefaultLength` takes no arguments and returns a\nphrase of the SDK's default length:\n\n```bash\nlogoscore call accounts_module createRandomMnemonicWithDefaultLength\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module createRandomMnemonicWithDefaultLength", "status": "pass", "exit_code": 0, "output": "{\"method\":\"createRandomMnemonicWithDefaultLength\",\"module\":\"accounts_module\",\"result\":\"sketch office insect before zebra drip answer crew purity runway correct ability\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.10 Map a word count to entropy strength\n\n`lengthToEntropyStrength` maps a mnemonic word count to its entropy\nstrength in bits \u2014 12 words is 128 bits. This exercises an `int`\nround-trip:\n\n```bash\nlogoscore call accounts_module lengthToEntropyStrength 12\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module lengthToEntropyStrength 12", "status": "pass", "exit_code": 0, "output": "{\"method\":\"lengthToEntropyStrength\",\"module\":\"accounts_module\",\"result\":128,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call accounts_module lengthToEntropyStrength 24\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module lengthToEntropyStrength 24", "status": "pass", "exit_code": 0, "output": "{\"method\":\"lengthToEntropyStrength\",\"module\":\"accounts_module\",\"result\":256,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.11 Create and use a keystore\n\nInitialise a keystore in a fresh directory (`scryptN`=4096, `scryptP`=6\nkeep the test fast), then create a new account in it. `keystoreNewAccount`\nreturns the new account's address:\n\n```bash\nlogoscore call accounts_module initKeystore ./ks 4096 6\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module initKeystore ./ks 4096 6", "status": "pass", "exit_code": 0, "output": "{\"method\":\"initKeystore\",\"module\":\"accounts_module\",\"result\":true,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call accounts_module keystoreNewAccount test-passphrase\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module keystoreNewAccount test-passphrase", "status": "pass", "exit_code": 0, "output": "{\"method\":\"keystoreNewAccount\",\"module\":\"accounts_module\",\"result\":\"{\\\"address\\\":\\\"0xaAF01d0f7910968492AD383661c9b082323de25a\\\",\\\"url\\\":\\\"keystore:///tmp/doctest-test-0mobci7z/ks/UTC--2026-06-22T19-05-46.486878317Z--aaf01d0f7910968492ad383661c9b082323de25a\\\"}\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.12 List the keystore's accounts\n\n`keystoreAccounts` returns the accounts now present in the keystore \u2014 the\none we just created:\n\n```bash\nlogoscore call accounts_module keystoreAccounts\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module keystoreAccounts", "status": "pass", "exit_code": 0, "output": "{\"method\":\"keystoreAccounts\",\"module\":\"accounts_module\",\"result\":[\"{\\\"address\\\":\\\"0xaAF01d0f7910968492AD383661c9b082323de25a\\\",\\\"url\\\":\\\"keystore:///tmp/doctest-test-0mobci7z/ks/UTC--2026-06-22T19-05-46.486878317Z--aaf01d0f7910968492ad383661c9b082323de25a\\\"}\"],\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.13 Stop the daemon\n\nShut the daemon down cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe daemon removes its state file and exits.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.14 Confirm the daemon has stopped\n\nWith no daemon running, the client reports `not_running` and exits\nnon-zero, so we add `|| true` to let the doc-test assert on the output:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"2ee10eeddb59\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}]}, {"meta": {"name": "Driving the Accounts UI Against This Module", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Driving the Accounts UI Against This Module\n\nThe companion to the [headless runtime doc-test](accounts-module-runtime.md):\ninstead of calling `accounts_module` through the `logoscore` daemon, this one\ndrives the real **[`logos-accounts-ui`](https://github.com/logos-co/logos-accounts-ui)**\ndesktop app against **this** commit of the module.\n\n`logos-accounts-ui` is a QML UI plugin built with\n[`logos-app-builder`](https://github.com/logos-co/logos-app-builder), so its\nflake exposes a standalone app (`apps.default`) that `nix run` launches in its\nown window with all backend module dependencies bundled and auto-loaded. The\nUI declares `accounts_module` as a flake input, so we build the app with an\n`--override-input` that points that input at the commit under test. The UI then\ntalks to **this** module over the Logos IPC bridge, exactly as it would in\n`logos-basecamp`.\n\nThe app is launched headless (`QT_QPA_PLATFORM=offscreen`) and driven through\nthe QML inspector via [`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp):\nwe wait for elements to appear, type into inputs, click buttons, assert on the\nresults the module returns, and capture screenshots that are embedded in the\nrendered tutorial and the CI report.\n\n**What you'll build:** The `logos-accounts-ui` standalone app, built against this `accounts_module` commit and driven headlessly through its QML UI.\n\n**What you'll learn:**\n\n- How a UI built with `logos-app-builder` exposes a standalone `nix run` app\n- How to override the UI's module input so it runs against a specific module commit\n- How to drive a headless Qt/QML app with logos-qt-mcp (wait, type, click, assert)\n- How to capture screenshots of the running UI for documentation and CI reports\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required.", "execs": []}, {"md": "## How the standalone UI app works\n\n`logos-accounts-ui` is a QML UI plugin (`accounts_ui`) that declares\n`accounts_module` as a dependency. Because it is built with\n`logos-app-builder`, its flake's `apps.default` is a self-contained desktop\napp:\n\n```\n+----------------------+   backend.createRandomMnemonic()   +-------------------+\n|     accounts_ui      | --------------------------------->  |  accounts_module  |\n|  AccountsView.qml    |   IPC (Logos API bridge)            |   C++ plugin      |\n+----------------------+                                     +-------------------+\n           ^                                                          ^\n           \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 bundled & launched by \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                           logos-app-builder standalone app\n```\n\nThe standalone app bundles every module dependency (here `accounts_module`)\nand loads it automatically at startup \u2014 so when the QML calls\n`backend.lengthToEntropyStrength(12)`, the call travels over the Logos bridge\nto the real module and comes back with `128`. By overriding the\n`accounts_module` input at build time we make that backend **this** commit.", "execs": []}, {"md": "## Step 1: Clone the UI\n\nClone [`logos-accounts-ui`](https://github.com/logos-co/logos-accounts-ui).\nWe clone over HTTPS so the step works in CI; over SSH the URL is\n`git@github.com:logos-co/logos-accounts-ui.git`.", "execs": []}, {"md": "### 1.1 git clone\n\n```bash\ngit clone --depth 1 https://github.com/logos-co/logos-accounts-ui.git\n```", "execs": [{"kind": "run", "cmd": "git clone --depth 1 https://github.com/logos-co/logos-accounts-ui.git", "status": "pass", "exit_code": 0, "output": "Cloning into 'logos-accounts-ui'...\n", "note": ""}]}, {"md": "## Step 2: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the app's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 2.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-qt-mcp' -o result-mcp", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-qt-mcp/1fea509485a48ab185fafae8dc21bdbcc808a07e' into the Git cache...\nthese 2 derivations will be built:\n  /nix/store/vy080z96516npsdswp067wnk7kpr1xw3-qml-mcp-server-1.0.0.drv\n  /nix/store/d8bxqkiv6dzrjyls4q9a0ivwlid7a61y-logos-qt-mcp.drv\nthese 15 paths will be fetched (86.4 MiB download, 643.7 MiB unpacked):\n  /nix/store/ddx7976 <script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
