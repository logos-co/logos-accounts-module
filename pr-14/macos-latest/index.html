  .md table { border-collapse: collapse; margin: 8px 0; }
  .md th, .md td { border: 1px solid var(--border); padding: 5px 10px; }

  .exec { margin-bottom: 14px; }
  .exec:last-child { margin-bottom: 0; }
  .exec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .badge { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 4px; }

  .badge.info { background: rgba(210,153,34,.15); color: var(--info); }

  .note { color: var(--muted); font-size: 12.5px; margin-bottom: 6px; }

n[2026-05-31 18:39:23.843] [info] [capability_module] [LogosProviderObject] LogosProviderBase::init called\n[2026-05-31 18:39:23.843] [info] [capability_module] [LogosProviderObject] ModuleProxy: created, wrapping LogosProviderObject \"capability_module\"\n[2026-05-31 18:39:23.843] [info] [capability_module] RemoteTransportHost: Created registry host with URL: \"local:logos_capability_module_5e9f25aad7aa\"\n[2026-05-31 18:39:23.843] [info] [capability_module] RemoteTransportHost: Published object: \"capability_module\"\n[2026-05-31 18:39:23.843] [info] [capability_module] [LogosProviderObject] LogosAPIProvider: successfully published \"capability_module\"\n[2026-05-31 18:39:24.106] [info] [capability_module] [LogosProviderObject] Saving token for module: \"capability_module\"\n[2026-05-31 18:39:24.106] [info] Module loaded: capability_module\nLogoscore daemon started (pid 5742, instance 5e9f25aad7aa)\nDaemon state: /Users/runner/.logoscore/daemon/state.json\nLocal client config: /Users/runner/.logoscore/client/config.json\n", "note": ""}]}, {"md": "### 4.3 Check daemon status\n\nVerify the daemon is running:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":5742,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"capability_module\",\"status\":\"loaded\"},{\"name\":\"accounts_module\",\"status\":\"not_loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":1,\"not_loaded\":1}}\n", "note": ""}]}, {"md": "### 4.4 List discovered modules\n\n`accounts_module` should be visible in the scan directory:\n\n```bash\nlogoscore list-modules\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore list-modules", "status": "pass", "exit_code": 0, "output": "[{\"name\":\"capability_module\",\"status\":\"loaded\"},{\"name\":\"accounts_module\",\"status\":\"not_loaded\"}]\n", "note": ""}]}, {"md": "### 4.5 Load the module\n\nLoad `accounts_module` into the running daemon:\n\n```bash\nlogoscore load-module accounts_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module accounts_module", "status": "pass", "exit_code": 0, "output": "{\"dependencies_loaded\":[],\"module\":\"accounts_module\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.6 Confirm the module is loaded\n\nRe-run `status`; the module that was `not_loaded` before now reports\n`loaded`:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"pid\":5742,\"status\":\"running\",\"version\":\"1.0.0\"},\"modules\":[{\"name\":\"capability_module\",\"status\":\"loaded\"},{\"name\":\"accounts_module\",\"status\":\"loaded\"}],\"modules_summary\":{\"crashed\":0,\"loaded\":2,\"not_loaded\":0}}\n", "note": ""}]}, {"md": "### 4.7 Introspect the module with module-info\n\n`module-info` lists the `Q_INVOKABLE` methods the module exposes \u2014 the\nsame methods you can `call`:\n\n```bash\nlogoscore module-info accounts_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore module-info accounts_module", "status": "pass", "exit_code": 0, "output": "{\"methods\":[{\"isInvokable\":true,\"name\":\"initKeystore\",\"parameters\":[{\"name\":\"dir\",\"type\":\"QString\"},{\"name\":\"scryptN\",\"type\":\"int\"},{\"name\":\"scryptP\",\"type\":\"int\"}],\"returnType\":\"bool\",\"signature\":\"initKeystore(QString,int,int)\"},{\"isInvokable\":true,\"name\":\"closeKeystore\",\"parameters\":[{\"name\":\"privateKey\",\"type\":\"QString\"}],\"returnType\":\"bool\",\"signature\":\"closeKeystore(QString)\"},{\"isInvokable\":true,\"name\":\"keystoreAccounts\",\"returnType\":\"QStringList\",\"signature\":\"keystoreAccounts()\"},{\"isInvokable\":true,\"name\":\"keystoreNewAccount\",\"parameters\":[{\"name\":\"passphrase\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"keystoreNewAccount(QString)\"},{\"isInvokable\":true,\"name\":\"keystoreImport\",\"parameters\":[{\"name\":\"keyJSON\",\"type\":\"QString\"},{\"name\":\"passphrase\",\"type\":\"QString\"},{\"name\":\"newPassphrase\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"keystoreImport(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"keystoreExport\",\"parameters\":[{\"name\":\"address\",\"type\":\"QString\"},{\"name\":\"passphrase\",\"type\":\"QString\"},{\"name\":\"newPassphrase\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"keystoreExport(QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"keystoreDelete\",\"parameters\":[{\"name\":\"address\",\"type\":\"QString\"},{\"name\":\"passphrase\",\"type\":\"QString\"}],\"returnType\":\"bool\",\"signature\":\"keystoreDelete(QString,QString)\"},{\"isInvokable\":true,\"name\":\"keystoreHasAddress\",\"parameters\":[{\"name\":\"address\",\"type\":\"QString\"}],\"returnType\":\"bool\",\"signature\":\"keystoreHasAddress(QString)\"},{\"isInvokable\":true,\"name\":\"keystoreUnlock\",\"parameters\":[{\"name\":\"address\",\"type\":\"QString\"},{\"name\":\"passphrase\",\"type\":\"QString\"}],\"returnType\":\"bool\",\"signature\":\"keystoreUnlock(QString,QString)\"},{\"isInvokable\":true,\"name\":\"keystoreLock\",\"parameters\":[{\"name\":\"address\",\"type\":\"QString\"}],\"returnType\":\"bool\",\"signature\":\"keystoreLock(QString)\"},{\"isInvokable\":true,\"name\":\"keystoreTimedUnlock\",\"parameters\":[{\"name\":\"address\",\"type\":\"QString\"},{\"name\":\"passphrase\",\"type\":\"QString\"},{\"name\":\"timeoutSeconds\",\"type\":\"int\"}],\"returnType\":\"bool\",\"signature\":\"keystoreTimedUnlock(QString,QString,int)\"},{\"isInvokable\":true,\"name\":\"keystoreUpdate\",\"parameters\":[{\"name\":\"address\",\"type\":\"QString\"},{\"name\":\"passphrase\",\"type\":\"QString\"},{\"name\":\"newPassphrase\",\"type\":\"QString\"}],\"returnType\":\"bool\",\"signature\":\"keystoreUpdate(QString,QString,QString)\"},{\"isInvokable ame\":\"passphrase\",\"type\":\"QString\"},{\"name\":\"txJSON\",\"type\":\"QString\"},{\"name\":\"chainIDHex\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"extKeystoreSignTxWithPassphrase(QString,QString,QString,QString)\"},{\"isInvokable\":true,\"name\":\"extKeystoreDerive\",\"parameters\":[{\"name\":\"address\",\"type\":\"QString\"},{\"name\":\"derivationPath\",\"type\":\"QString\"},{\"name\":\"pin\",\"type\":\"int\"}],\"returnType\":\"QString\",\"signature\":\"extKeystoreDerive(QString,QString,int)\"},{\"isInvokable\":true,\"name\":\"extKeystoreDeriveWithPassphrase\",\"parameters\":[{\"name\":\"address\",\"type\":\"QString\"},{\"name\":\"derivationPath\",\"type\":\"QString\"},{\"name\":\"pin\",\"type\":\"int\"},{\"name\":\"passphrase\",\"type\":\"QString\"},{\"name\":\"newPassphrase\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"extKeystoreDeriveWithPassphrase(QString,QString,int,QString,QString)\"},{\"isInvokable\":true,\"name\":\"extKeystoreFind\",\"parameters\":[{\"name\":\"address\",\"type\":\"QString\"},{\"name\":\"url\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"extKeystoreFind(QString,QString)\"},{\"isInvokable\":true,\"name\":\"createExtKeyFromMnemonic\",\"parameters\":[{\"name\":\"phrase\",\"type\":\"QString\"},{\"name\":\"passphrase\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"createExtKeyFromMnemonic(QString,QString)\"},{\"isInvokable\":true,\"name\":\"deriveExtKey\",\"parameters\":[{\"name\":\"extKeyStr\",\"type\":\"QString\"},{\"name\":\"pathStr\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"deriveExtKey(QString,QString)\"},{\"isInvokable\":true,\"name\":\"extKeyToECDSA\",\"parameters\":[{\"name\":\"extKeyStr\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"extKeyToECDSA(QString)\"},{\"isInvokable\":true,\"name\":\"ecdsaToPublicKey\",\"parameters\":[{\"name\":\"privateKeyECDSAStr\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"ecdsaToPublicKey(QString)\"},{\"isInvokable\":true,\"name\":\"publicKeyToAddress\",\"parameters\":[{\"name\":\"publicKeyStr\",\"type\":\"QString\"}],\"returnType\":\"QString\",\"signature\":\"publicKeyToAddress(QString)\"},{\"isInvokable\":true,\"name\":\"createRandomMnemonic\",\"parameters\":[{\"name\":\"length\",\"type\":\"int\"}],\"returnType\":\"QString\",\"signature\":\"createRandomMnemonic(int)\"},{\"isInvokable\":true,\"name\":\"createRandomMnemonicWithDefaultLength\",\"returnType\":\"QString\",\"signature\":\"createRandomMnemonicWithDefaultLength()\"},{\"isInvokable\":true,\"name\":\"lengthToEntropyStrength\",\"parameters\":[{\"name\":\"length\",\"type\":\"int\"}],\"returnType\":\"int\",\"signature\":\"lengthToEntropyStrength(int)\"}],\"name\":\"accounts_module\",\"status\":\"loaded\"}\n", "note": ""}]}, {"md": "### 4.8 Generate a random mnemonic\n\n`createRandomMnemonic` takes a word count and returns a fresh BIP-39\nphrase \u2014 a real round-trip through the go-wallet-sdk C library wrapped by\nthe module, dispatched over liblogos' IPC:\n\n```bash\nlogoscore call accounts_module createRandomMnemonic 12\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module createRandomMnemonic 12", "status": "pass", "exit_code": 0, "output": "{\"method\":\"createRandomMnemonic\",\"module\":\"accounts_module\",\"result\":\"diet trial dynamic engage thing federal goat mimic owner outer gown shed\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.9 Generate a default-length mnemonic\n\n`createRandomMnemonicWithDefaultLength` takes no arguments and returns a\nphrase of the SDK's default length:\n\n```bash\nlogoscore call accounts_module createRandomMnemonicWithDefaultLength\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module createRandomMnemonicWithDefaultLength", "status": "pass", "exit_code": 0, "output": "{\"method\":\"createRandomMnemonicWithDefaultLength\",\"module\":\"accounts_module\",\"result\":\"insect yellow witness brisk essence vanish slab then offer donkey erupt track\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.10 Map a word count to entropy strength\n\n`lengthToEntropyStrength` maps a mnemonic word count to its entropy\nstrength in bits \u2014 12 words is 128 bits. This exercises an `int`\nround-trip:\n\n```bash\nlogoscore call accounts_module lengthToEntropyStrength 12\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module lengthToEntropyStrength 12", "status": "pass", "exit_code": 0, "output": "{\"method\":\"lengthToEntropyStrength\",\"module\":\"accounts_module\",\"result\":128,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call accounts_module lengthToEntropyStrength 24\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module lengthToEntropyStrength 24", "status": "pass", "exit_code": 0, "output": "{\"method\":\"lengthToEntropyStrength\",\"module\":\"accounts_module\",\"result\":256,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.11 Create and use a keystore\n\nInitialise a keystore in a fresh directory (`scryptN`=4096, `scryptP`=6\nkeep the test fast), then create a new account in it. `keystoreNewAccount`\nreturns the new account's address:\n\n```bash\nlogoscore call accounts_module initKeystore ./ks 4096 6\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module initKeystore ./ks 4096 6", "status": "pass", "exit_code": 0, "output": "{\"method\":\"initKeystore\",\"module\":\"accounts_module\",\"result\":true,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nlogoscore call accounts_module keystoreNewAccount test-passphrase\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module keystoreNewAccount test-passphrase", "status": "pass", "exit_code": 0, "output": "{\"method\":\"keystoreNewAccount\",\"module\":\"accounts_module\",\"result\":\"{\\\"address\\\":\\\"0xC2407d5A3FB59aeb351C8082A6fd5ba94FD383b5\\\",\\\"url\\\":\\\"keystore:///private/tmp/doctest-test-9cyw5xn_/ks/UTC--2026-05-31T18-39-27.371869000Z--c2407d5a3fb59aeb351c8082a6fd5ba94fd383b5\\\"}\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.12 List the keystore's accounts\n\n`keystoreAccounts` returns the accounts now present in the keystore \u2014 the\none we just created:\n\n```bash\nlogoscore call accounts_module keystoreAccounts\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call accounts_module keystoreAccounts", "status": "pass", "exit_code": 0, "output": "{\"method\":\"keystoreAccounts\",\"module\":\"accounts_module\",\"result\":[\"{\\\"address\\\":\\\"0xC2407d5A3FB59aeb351C8082A6fd5ba94FD383b5\\\",\\\"url\\\":\\\"keystore:///private/tmp/doctest-test-9cyw5xn_/ks/UTC--2026-05-31T18-39-27.371869000Z--c2407d5a3fb59aeb351c8082a6fd5ba94fd383b5\\\"}\"],\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.13 Stop the daemon\n\nShut the daemon down cleanly:\n\n```bash\nlogoscore stop\n```\n\nThe daemon removes its state file and exits.", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore stop", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.14 Confirm the daemon has stopped\n\nWith no daemon running, the client reports `not_running` and exits\nnon-zero, so we add `|| true` to let the doc-test assert on the output:\n\n```bash\nlogoscore status\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore status || true", "status": "pass", "exit_code": 0, "output": "{\"daemon\":{\"instance_id\":\"5e9f25aad7aa\",\"status\":\"not_running\",\"version\":\"1.0\"},\"modules\":[],\"rpc_error\":\"core_service not reachable\"}\n", "note": ""}]}]}, {"meta": {"name": "Driving the Accounts UI Against This Module", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Driving the Accounts UI Against This Module\n\nThe companion to the [headless runtime doc-test](accounts-module-runtime.md):\ninstead of calling `accounts_module` through the `logoscore` daemon, this one\ndrives the real **[`logos-accounts-ui`](https://github.com/logos-co/logos-accounts-ui)**\ndesktop app against **this** commit of the module.\n\n`logos-accounts-ui` is a QML UI plugin built with\n[`logos-app-builder`](https://github.com/logos-co/logos-app-builder), so its\nflake exposes a standalone app (`apps.default`) that `nix run` launches in its\nown window with all backend module dependencies bundled and auto-loaded. The\nUI declares `accounts_module` as a flake input, so we build the app with an\n`--override-input` that points that input at the commit under test. The UI then\ntalks to **this** module over the Logos IPC bridge, exactly as it would in\n`logos-basecamp`.\n\nThe app is launched headless (`QT_QPA_PLATFORM=offscreen`) and driven through\nthe QML inspector via [`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp):\nwe wait for elements to appear, type into inputs, click buttons, assert on the\nresults the module returns, and capture screenshots that are embedded in the\nrendered tutorial and the CI report.\n\n**What you'll build:** The `logos-accounts-ui` standalone app, built against this `accounts_module` commit and driven headlessly through its QML UI.\n\n**What you'll learn:**\n\n- How a UI built with `logos-app-builder` exposes a standalone `nix run` app\n- How to override the UI's module input so it runs against a specific module commit\n- How to drive a headless Qt/QML app with logos-qt-mcp (wait, type, click, assert)\n- How to capture screenshots of the running UI for documentation and CI reports\n\n## Prerequisites\n\n- **Nix** with flakes enabled. Install from [nixos.org](https://nixos.org/download.html), then enable flakes:\n\n```bash\nmkdir -p ~/.config/nix\necho 'experimental-features = nix-command flakes' >> ~/.config/nix/nix.conf\n```\n\nVerify: `nix flake --help >/dev/null 2>&1 && echo \"Flakes enabled\"`\n\n- **A Linux or macOS machine.** The app runs headless via `QT_QPA_PLATFORM=offscreen`, so no display is required.", "execs": []}, {"md": "## How the standalone UI app works\n\n`logos-accounts-ui` is a QML UI plugin (`accounts_ui`) that declares\n`accounts_module` as a dependency. Because it is built with\n`logos-app-builder`, its flake's `apps.default` is a self-contained desktop\napp:\n\n```\n+----------------------+   backend.createRandomMnemonic()   +-------------------+\n|     accounts_ui      | --------------------------------->  |  accounts_module  |\n|  AccountsView.qml    |   IPC (Logos API bridge)            |   C++ plugin      |\n+----------------------+                                     +-------------------+\n           ^                                                          ^\n           \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 bundled & launched by \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                           logos-app-builder standalone app\n```\n\nThe standalone app bundles every module dependency (here `accounts_module`)\nand loads it automatically at startup \u2014 so when the QML calls\n`backend.lengthToEntropyStrength(12)`, the call travels over the Logos bridge\nto the real module and comes back with `128`. By overriding the\n`accounts_module` input at build time we make that backend **this** commit.", "execs": []}, {"md": "## Step 1: Clone the UI\n\nClone [`logos-accounts-ui`](https://github.com/logos-co/logos-accounts-ui).\nWe clone over HTTPS so the step works in CI; over SSH the URL is\n`git@github.com:logos-co/logos-accounts-ui.git`.", "execs": []}, {"md": "### 1.1 git clone\n\n```bash\ngit clone --depth 1 https://github.com/logos-co/logos-accounts-ui.git\n```", "execs": [{"kind": "run", "cmd": "git clone --depth 1 https://github.com/logos-co/logos-accounts-ui.git", "status": "pass", "exit_code": 0, "output": "Cloning into 'logos-accounts-ui'...\n", "note": ""}]}, {"md": "## Step 2: Build the qt-mcp test driver\n\n[`logos-qt-mcp`](https://github.com/logos-co/logos-qt-mcp) is the harness the\ndoc-test uses to connect to the app's QML inspector and drive it. Build it\nonce and link it as `./result-mcp`.", "execs": []}, {"md": "### 2.1 Build logos-qt-mcp\n\n```bash\nnix build 'github:logos-co/logos-qt-mcp' -o result-mcp\n```", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-qt-mcp' -o result-mcp", "status": "pass", "exit_code": 0, "output": "these 4 paths will be fetched (16.7 MiB download, 99.1 MiB unpacked):\n  /nix/store/dgfikfjky3nq6gycpd08fyvmr7ww1j7j-bash-interactive-5.3p3\n  /nix/store/hbbyr0434ww52i6bph4lyswm76ixzpcw-libuv-1.51.0-dev\n  /nix/store/n8kmhplnmhzx347d76fsbxy6jz7lp168-logos-qt-mcp\n  /nix/store/3scj3c1qxh5iclf8jy5hbl9pki40y77n-nodejs-22.19.0\ncopying path '/nix/store/dgfikfjky3nq6gycpd08fyvmr7ww1j7j-bash-interactive-5.3p3' from 'https://cache.nixos.org'...\ncopying path '/nix/store/hbbyr0434ww52i6bph4lyswm76ixzpcw-libuv-1.51.0-dev' from 'https://cache.nixos.org'...\ncopying path '/nix/store/3scj3c1qxh5iclf8jy5hbl9pki40y77n-nodejs-22.19.0' from 'https://cache.nixos.org'...\ncopying path '/nix/store/n8kmhplnmhzx347d76fsbxy6jz7lp168-logos-qt-mcp' from 'https://logos-co.cachix.org'...\n", "note": ""}]}, {"md": "## Step 3: Launch the UI and exercise the module\n\nLaunch the standalone app with `nix run`, overriding the `accounts_module`\ninput so the UI runs against **this** commit of the module. The doc-test\ndrives the running app: it waits for the UI to appear, generates a mnemonic,\nand computes an entropy strength \u2014 each a real round-trip to `accounts_module`\nover the Logos bridge.\n\n> `` pins the override to the commit under test (the runner expands\n> it: locally this checkout's `HEAD`, in CI the commit being tested). With no\n> pin it falls back to the module's latest `master`.", "execs": []}, {"md": "### 3.1 Launch and drive the app\n\n```bash\nnix run ./logos-accounts-ui --override-input accounts_module github:logos-co/logos-accounts-module/e60b41474c72d513e33417cd10242d5255a67bd7\n```\n\n![Mnemonic section visible](data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABAAAAAMACAIAAAA12IJaAAAACXBIWXMAAA7EAAAOxAGVKw4bAAAgAElEQVR4nOzdd5wU5f0H8O/Mzva7vd4L1xscR7kDDjg6CIciSsTYxaiJRozGFo3GEs0vlkRjIRpRIZEo2IgUQUU6R7/e++31vre9zu+PwXW9xt2BUvbz/sPXMvM8z3xnbsd9vjPPPMNERkYSAAAAAAC4B/ZCBwAAAAAAAD8fJAAAAAAAAG4ECQAAAAAAgBtBAgAAAAAA4EaQAAAAAAAAuBEkAAAAAAAAbgQJAAAAAACAG0ECAAAAAADgRpAAAAAAAAC4ESQAAAAAAABuBAkAAAAAAIAbQQIAAAAAAOBGkAAAAAAAALgRJAAAAAAAAG4ECQAAAAAAgBtBAgAAAAAA4EaQAAAAAAAAuBEkAAAAAAAAbgQJAAAAAACAG+HOpfLkyZP/8Y9/CJ9fffXVL7744nyE9JOTSCRTp04loo6OjqqqqlHVffDBB6+55hoiamhouPnmm/utXbt27XXXXUdETU1NN9xww3mKFwAAAADgvDmnOwALFy50fl6wYME5B/Mz8ff3f/HFF1988cVbbrlltHUZhhE+REZGpqSkuK4SiUSLFy8WPrMsbq0AAAAAwMVo7P1UkUg0d+5c5z8nTpwYGBh4PkK6ZCxbtsz1n5mZmd7e3hcqGAAAAACAkRj7EKCMjAwvLy8iOnz48KxZsxiGmT9//ubNm50FwsPDV65cmZqaGhsb29jYWFZWtn79+s7OzpGsDQgIuPbaa9PS0uLj4+vr6/Pz87/88sv6+noimjdvnjC65t133z158qTQ1FNPPUVE+/bt++ijj5555pmQkBCdTvfGG2/cfffdU6ZMMRgMR44cWbduncFguPXWW+fPn+/chXfeeef48ePvvfeer6/vXXfdlZycHBYW1t7eXlVV9f777wtbHMqSJUtef/11q9Uq/LNfPiCQy+W33nrrlClToqKijEZjVVXV1q1bDx06RERTp069++67iWjz5s1hYWELFy4MDw+vq6t79913jx07JlSfOHHiTTfdFBMT4+vr29DQUFhY+M477+j1emHt5MmTly1bJuzg119/XV1dffvttxPRpk2bDhw4QESBgYGrVq2aPHlyVFRUeXl5bm7uxx9/bDAYXLe+ZcuWpKSkWbNmsSz7y1/+cnRfAgAAAAC41Iw9AXCO/1m3bt2kSZOUSuXChQudCUBQUNBrr73mvCcQExMTExOTkZHxwAMPqNXq4df6+Pi89tprERERwtqEhISEhIRFixbdd999arXaz88vOTmZiJyX26VSqbCkvLyciOLi4iIjIy0Wy0svvRQcHExECoVixYoVcrn8z3/+c2hoaGxsrFDRw8MjOTm5ubnZ29t7w4YNzgYjIiIiIiIyMzPXrl0rtDkouVyelZX13XffCcHMnDmzXwGRSLR+/Xrnjsjl8mnTpmVkZLz44os7d+708vISwr7jjjsiIyOdO/t///d/t99+e0NDw5IlS5544gnnaKLY2NjY2NipU6euWbPGYrGMHz/+lVdeEYvFwtq7775brVYL2/L19SUi4TCGh4cLBdLS0tLS0iZPnvzwww+bzWbn1u+6667Q0FAiMplMZ/2jAwAAAMClbox   const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  picker.addEventListener("change", () => render(+picker.value));
  render(0);
</script>
</body>
</html>
